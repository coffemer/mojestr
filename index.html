<!DOCTYPE html>
<html lang="cs">
<head>

    <title>Moje první stránka</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;

        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;

            text-decoration: none;
        }
        nav a:hover {

        }
        main {
            padding: 20px;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

<header>
    <h1>Vítej na mojí stránce</h1>
</header>

<nav>
    <a href="#">Domů</a>
    <a href="#">O mně</a>
    <a href="#">Kontakt</a>
</nav>

<main>
    <h2>Úvod</h2>
    <p>Toto je moje první webová stránka vytvořená v HTML.</p>

<footer>
    <p>&copy; 2026 Moje stránka</p>
</footer>
